<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Prompt Generator</title><link rel="stylesheet" href="../../assets/css/style.css"></head><body><header class="tool-hero"><div class="wrap"><nav class="nav"><a class="brand" href="../../index.html"><i>⚡</i>Creator ToolBox AI</a><a class="btn2" href="../../index.html">All Tools</a></nav></div></header><main class="tool-main"><div class="wrap"><h1>Prompt Generator</h1><p class="lead">Build a clean image prompt. This is a real template-based prompt builder, not a fake AI tool.</p><div class="panel"><label>Topic / scene</label><textarea id="topic" placeholder="Example: a haunted house during a storm at night"></textarea><div class="row"><div><label>Content type</label><select id="type"><option value="scary">Scary / mystery</option><option value="facts">Facts / educational</option><option value="history">History</option><option value="product">Product</option><option value="motivation">Motivation</option></select></div><div><label>Style</label><select id="style"><option>cinematic realistic</option><option>dark horror documentary</option><option>ancient historical documentary</option><option>premium product photography</option><option>colorful social media style</option></select></div></div><label>Format</label><select id="ratio"><option>vertical 9:16</option><option>square 1:1</option><option>wide 16:9</option></select><br><br><button class="btn" onclick="generatePrompt()">Generate Prompt</button> <button class="btn2" onclick="copyOutput()">Copy</button><div id="output" class="output"></div></div></div></main><script src="../../assets/js/app.js"></script></body></html>
